spring.application.name=ExAiAssistant

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/exai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Claude Code CLI
claude.bin=C:/Users/ExExEcut1on!/AppData/Roaming/npm/claude.cmd
claude.data-dir=./data

# Embedding model (BGE-small-zh-v1.5 ONNX)
embedding.model-path=classpath:embedding/model.onnx
embedding.tokenizer-path=classpath:embedding/

# Server
server.port=8080
