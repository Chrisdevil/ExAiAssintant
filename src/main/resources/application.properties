spring.application.name=ExAiAssistant

# MySQL (override via env: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD)
spring.datasource.url=jdbc:mysql://localhost:3306/exai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Claude Code CLI (override via env: CLAUDE_BIN)
claude.bin=${CLAUDE_BIN:claude}
claude.data-dir=./data

# Embedding model (BGE-small-zh-v1.5 ONNX)
embedding.model-path=classpath:embedding/model.onnx
embedding.tokenizer-path=classpath:embedding/

# Logging
logging.level.com.example.exaiassistant=INFO
logging.level.com.example.exaiassistant.service.MemoryService=INFO
logging.level.com.example.exaiassistant.service.ConversationService=INFO

# Server
server.port=${PORT:8080}
